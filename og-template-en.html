<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>

<body>
  <div class="edition"><span>PORTFOLIO</span><span>JULY 2026</span></div>
  <h1>Jonathan Fribert</h1>
